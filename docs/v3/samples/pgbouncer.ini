; ====================================================================
; V3-OPS-01 — sample PgBouncer config for MaluDB.
;
; Copy to /etc/pgbouncer/pgbouncer.ini, fill in the upstream host /
; auth_file, and start with:
;   systemctl start pgbouncer
;
; Doctrine (read docs/v3/read-replicas.md first):
;   * pool_mode = transaction       — short-lived REST/MC2DB calls
;                                     reuse a small upstream pool.
;   * Prepared statements MUST be   — clients running maludb-restd /
;     disabled at the client.         maludb-mc2dbd / cli/maludb pass
;                                     prepare_threshold=None already.
;   * Realtime LISTEN/NOTIFY does   — point maludb-realtimed at the
;     NOT survive a transaction-     PostgreSQL primary directly,
;     pooled rotation; don't put     bypassing PgBouncer.
;     it behind this pool.
;
; Tune defaults: max_client_conn / default_pool_size scale with the
; number of restd/mc2dbd workers you run, not with absolute traffic.
; ====================================================================

[databases]
; One pool per database. Match your cluster names.
maludb            = host=10.0.0.10 port=5432 dbname=maludb        auth_user=pgbouncer
contrib_regression = host=10.0.0.10 port=5432 dbname=contrib_regression auth_user=pgbouncer

[pgbouncer]
listen_addr      = 0.0.0.0
listen_port      = 6432
unix_socket_dir  = /var/run/postgresql
auth_type        = scram-sha-256
auth_file        = /etc/pgbouncer/userlist.txt
auth_query       = SELECT usename, passwd FROM pg_shadow WHERE usename=$1

pool_mode             = transaction
default_pool_size     = 20
min_pool_size         = 5
reserve_pool_size     = 5
reserve_pool_timeout  = 3
max_client_conn       = 500
max_db_connections    = 40

server_reset_query    = DISCARD ALL
server_check_query    = SELECT 1
server_check_delay    = 30
server_lifetime       = 3600
server_idle_timeout   = 600
query_timeout         = 0
query_wait_timeout    = 120
client_idle_timeout   = 0
client_login_timeout  = 60

; Logging — bounded so logs don't blow up under steady load.
log_connections       = 0
log_disconnections    = 0
log_pooler_errors     = 1
stats_period          = 60

; Admin console (psql -p 6432 -U pgbouncer pgbouncer).
admin_users           = pgbouncer
stats_users           = pgbouncer, maludb_memory_auditor
