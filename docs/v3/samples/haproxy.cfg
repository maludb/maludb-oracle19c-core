# =====================================================================
# V3-OPS-01 — sample HAProxy config for MaluDB.
#
# Two TCP frontends:
#   :5432 -> only the current PostgreSQL primary (writes + LISTEN).
#   :5433 -> any healthy replica (reads), with primary as last resort.
#
# Health-probes use the standard pg_isready + pg_stat_replication
# pattern: a primary answers "is_in_recovery=false"; a replica
# answers "is_in_recovery=true" AND is within an operator-defined
# replay lag.
#
# Doctrine (read docs/v3/read-replicas.md first):
#   * MaluDB writes MUST hit the primary. Realtime LISTEN/NOTIFY
#     also MUST hit the primary (LISTEN does not propagate to
#     replicas).
#   * Retrieval reads (hybrid_search, search_memory_filter) MAY
#     hit a replica, but the operator is responsible for accepting
#     bounded staleness — typically < 100 ms on a healthy WAN replica.
#   * This config does NOT promote anybody. Failover is a Patroni /
#     repmgr / Stolon concern; HAProxy just routes to whichever node
#     currently looks like a primary.
# =====================================================================

global
    log /dev/log local0
    log /dev/log local1 notice
    daemon
    maxconn 4096
    stats socket /run/haproxy/admin.sock mode 660 level admin

defaults
    log     global
    mode    tcp
    option  dontlognull
    timeout connect 5s
    timeout client  1h
    timeout server  1h
    retries 2

# ----------------------------------------------------------------------
# 1. Writes + LISTEN frontend — primary only.
# ----------------------------------------------------------------------
frontend pg_primary_front
    bind *:5432
    default_backend pg_primary_back

backend pg_primary_back
    option tcp-check
    tcp-check connect port 5432
    tcp-check send-binary 00000023
    tcp-check send-binary 00030000
    tcp-check send-binary 7573657200          # 'user\0'
    tcp-check send "haproxy_probe\0\0"
    # The real health check is wired through xinetd or a small
    # postgres-aware probe — see docs/v3/read-replicas.md §"HAProxy
    # health probes" for the deployment-friendly long form. The shape
    # below is a TCP-only liveness check.
    server pg_a 10.0.0.10:5432 check inter 2s rise 2 fall 3
    server pg_b 10.0.0.11:5432 check inter 2s rise 2 fall 3 backup
    server pg_c 10.0.0.12:5432 check inter 2s rise 2 fall 3 backup

# ----------------------------------------------------------------------
# 2. Reads frontend — replicas first, primary as last-resort.
# ----------------------------------------------------------------------
frontend pg_reads_front
    bind *:5433
    default_backend pg_reads_back

backend pg_reads_back
    balance leastconn
    option tcp-check
    tcp-check connect port 5432
    server pg_b 10.0.0.11:5432 check inter 2s rise 2 fall 3 weight 100
    server pg_c 10.0.0.12:5432 check inter 2s rise 2 fall 3 weight 100
    server pg_a 10.0.0.10:5432 check inter 2s rise 2 fall 3 weight  10 backup

# ----------------------------------------------------------------------
# 3. Stats endpoint (optional).
# ----------------------------------------------------------------------
frontend stats_front
    mode http
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 10s
    stats admin if LOCALHOST
    acl LOCALHOST src 127.0.0.1
