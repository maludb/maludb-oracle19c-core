name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  DEBIAN_FRONTEND: noninteractive
  PGDG_KEY_URL: https://www.postgresql.org/media/keys/ACCC4CF8.asc

jobs:
  # ---------------------------------------------------------------------
  # Main build + regression matrix. PG 16 and 17 are required; 18 is
  # allowed-fail until we've validated the toolchain there.
  # ---------------------------------------------------------------------
  pg-matrix:
    name: PG ${{ matrix.pg }} build + installcheck + mc2dbd
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        pg: ['16', '17', '18']
    continue-on-error: ${{ matrix.pg == '18' }}
    env:
      PG_CONFIG: /usr/lib/postgresql/${{ matrix.pg }}/bin/pg_config
      PG_HBA: /etc/postgresql/${{ matrix.pg }}/main/pg_hba.conf

    steps:
      - uses: actions/checkout@v4

      - name: Install PostgreSQL ${{ matrix.pg }} (PGDG) + pgvector + build deps
        run: |
          set -euxo pipefail
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fsSL "$PGDG_KEY_URL" \
            -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt noble-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          # Remove any preinstalled PG to free port 5432 for the PGDG version.
          sudo systemctl stop postgresql 2>/dev/null || true
          sudo apt-get purge -y 'postgresql-*' 'postgresql-client-*' 2>/dev/null || true
          sudo apt-get autoremove -y || true
          sudo apt-get install -y \
            postgresql-${{ matrix.pg }} \
            postgresql-server-dev-${{ matrix.pg }} \
            postgresql-${{ matrix.pg }}-pgvector \
            build-essential pkg-config bison flex \
            libicu-dev libssl-dev libreadline-dev zlib1g-dev liblz4-dev libzstd-dev \
            libmicrohttpd-dev libjansson-dev libgnutls28-dev libcurl4-openssl-dev \
            jq curl python3
          sudo systemctl start postgresql@${{ matrix.pg }}-main

      - name: Relax local pg_hba to trust (CI only)
        run: |
          set -euxo pipefail
          sudo sed -i -E 's|^local[[:space:]]+all[[:space:]]+(all|postgres)[[:space:]]+peer$|local all all trust|' "$PG_HBA"
          sudo systemctl reload postgresql@${{ matrix.pg }}-main
          psql -h /var/run/postgresql -U postgres -c "SELECT version();"

      - name: Build maludb_core
        run: make PG_CONFIG="$PG_CONFIG"

      - name: Install maludb_core
        run: sudo make install PG_CONFIG="$PG_CONFIG"

      - name: Run pg_regress (installcheck)
        run: make installcheck PG_CONFIG="$PG_CONFIG"

      - name: Upload regression diffs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: regression-diffs-pg${{ matrix.pg }}
          path: |
            regression.diffs
            regression.out
            results/
          if-no-files-found: ignore

      - name: Build mc2dbd listener
        run: make -C mc2dbd PG_CONFIG="$PG_CONFIG"

      - name: Provision maludb role + database for mc2dbd service tests
        run: |
          set -euxo pipefail
          psql -h /var/run/postgresql -U postgres -c "CREATE ROLE maludb LOGIN SUPERUSER;"
          psql -h /var/run/postgresql -U postgres -c "CREATE DATABASE maludb OWNER maludb;"
          psql -U maludb -d maludb -c "CREATE EXTENSION maludb_core CASCADE;"
          psql -U maludb -d maludb -c "SELECT extname, extversion FROM pg_extension WHERE extname='maludb_core';"

      - name: Run mc2dbd service tests
        env:
          PGUSER: maludb
          PGDATABASE: maludb
        run: make -C mc2dbd test PG_CONFIG="$PG_CONFIG"

  # ---------------------------------------------------------------------
  # Stage 8 (V3-DOC-01) — documentation/version consistency gate. Runs on
  # ubuntu-24.04 without any PG install; the check is text-only.
  # ---------------------------------------------------------------------
  doc-consistency:
    name: Doc / version consistency (V3-DOC-01)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Run scripts/maludb-check-doc-consistency
        run: scripts/maludb-check-doc-consistency

  # ---------------------------------------------------------------------
  # ASan + UBSan against the PG 17 default build. We preload libasan into
  # the PG backend via a systemd drop-in so the sanitizer initializes
  # before PG's allocator wrappers run.
  #
  # Marked continue-on-error for the first iteration — sanitizer
  # integration with a stock PGDG cluster is finicky; we treat this as
  # informational until it's been stabilized on a couple of runs.
  # ---------------------------------------------------------------------
  sanitizer:
    name: ASan + UBSan (PG 17)
    runs-on: ubuntu-24.04
    continue-on-error: true
    env:
      PG_CONFIG: /usr/lib/postgresql/17/bin/pg_config
      PG_HBA: /etc/postgresql/17/main/pg_hba.conf

    steps:
      - uses: actions/checkout@v4

      - name: Install PG 17 + pgvector + sanitizer runtime
        run: |
          set -euxo pipefail
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fsSL "$PGDG_KEY_URL" \
            -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt noble-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo systemctl stop postgresql 2>/dev/null || true
          sudo apt-get purge -y 'postgresql-*' 'postgresql-client-*' 2>/dev/null || true
          sudo apt-get autoremove -y || true
          sudo apt-get install -y \
            postgresql-17 postgresql-server-dev-17 postgresql-17-pgvector \
            build-essential pkg-config bison flex \
            libicu-dev libssl-dev libreadline-dev zlib1g-dev \
            libmicrohttpd-dev libjansson-dev libgnutls28-dev libcurl4-openssl-dev \
            libasan8 libubsan1 \
            jq curl python3

      - name: Relax local pg_hba to trust (CI only)
        run: |
          set -euxo pipefail
          sudo sed -i -E 's|^local[[:space:]]+all[[:space:]]+(all|postgres)[[:space:]]+peer$|local all all trust|' "$PG_HBA"
          sudo systemctl reload postgresql@17-main

      - name: Build maludb_core with -fsanitize=address,undefined
        run: |
          make clean
          make PG_CONFIG="$PG_CONFIG" \
            COPT="-fsanitize=address,undefined -fno-omit-frame-pointer -O1 -g"

      - name: Install
        run: sudo make install PG_CONFIG="$PG_CONFIG"

      - name: Preload libasan into PG backend + restart cluster
        run: |
          set -euxo pipefail
          # gcc -print-file-name prefers the versioned soname (.so.8) which
          # is shipped by the runtime package libasan8. The unversioned
          # symlink only exists in libasan8-dev.
          ASAN_SO=$(gcc -print-file-name=libasan.so.8)
          echo "libasan: $ASAN_SO"
          test -e "$ASAN_SO" || { echo "libasan.so.8 not found"; exit 1; }
          sudo mkdir -p /etc/systemd/system/postgresql@17-main.service.d
          sudo tee /etc/systemd/system/postgresql@17-main.service.d/sanitizer.conf >/dev/null <<EOF
          [Service]
          Environment="LD_PRELOAD=${ASAN_SO}"
          Environment="ASAN_OPTIONS=detect_leaks=0:abort_on_error=1:print_stacktrace=1:strict_string_checks=1:check_initialization_order=1"
          Environment="UBSAN_OPTIONS=print_stacktrace=1:halt_on_error=1"
          EOF
          sudo systemctl daemon-reload
          sudo systemctl restart postgresql@17-main
          # Give the cluster a moment to be ready after restart.
          for _ in $(seq 1 20); do
            if psql -h /var/run/postgresql -U postgres -c "SELECT 1;" >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          psql -h /var/run/postgresql -U postgres -c "SHOW server_version;"

      - name: Run pg_regress under sanitizers
        run: make installcheck PG_CONFIG="$PG_CONFIG"

      - name: Upload sanitizer regression diffs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: regression-diffs-sanitizer
          path: |
            regression.diffs
            regression.out
            results/
          if-no-files-found: ignore

      - name: Capture PG log on failure
        if: failure()
        run: sudo journalctl -u postgresql@17-main --no-pager -n 500 || true

  # ---------------------------------------------------------------------
  # clang-tidy + scan-build over src/. Reports only — not gating yet.
  # Tightening to --status-bugs / -warnings-as-errors comes after we
  # have a clean baseline (likely a follow-up .clang-tidy config).
  # ---------------------------------------------------------------------
  static-analysis:
    name: clang-tidy + scan-build (PG 17)
    runs-on: ubuntu-24.04
    continue-on-error: true
    env:
      PG_CONFIG: /usr/lib/postgresql/17/bin/pg_config

    steps:
      - uses: actions/checkout@v4

      - name: Install PG 17 dev headers + clang static analysis
        run: |
          set -euxo pipefail
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fsSL "$PGDG_KEY_URL" \
            -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt noble-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y \
            postgresql-server-dev-17 \
            build-essential clang-18 clang-tidy-18 clang-tools-18 \
            pkg-config

      - name: clang-tidy on src/*.c
        run: |
          set -euxo pipefail
          clang-tidy-18 \
            --header-filter='^src/' \
            src/*.c \
            -- \
            -std=gnu11 \
            $($PG_CONFIG --cflags) \
            -I$($PG_CONFIG --includedir-server) || true

      - name: scan-build over full make
        run: |
          set -euxo pipefail
          make clean
          scan-build-18 -o scan-build-report \
            make PG_CONFIG="$PG_CONFIG" || true

      - name: Upload scan-build report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-build-report
          path: scan-build-report/
          if-no-files-found: ignore
